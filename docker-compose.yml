# ─────────────────────────────────────────────────────────────────────
#  NarrateKPI — docker-compose.yml
#  Local development with volume-mapped store persistence.
# ─────────────────────────────────────────────────────────────────────

services:
  narratekpi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: narratekpi
    ports:
      - "8000:8000"
    volumes:
      # Persist the JSON store on the host so data survives container restarts.
      - ./data:/data
      # Mount entire project for hot-reload during development.
      - .:/app
    environment:
      # ── Database ─────────────────────────────────────────────────
      # Uncomment and set to a PostgreSQL connection string for production.
      # If unset, the app falls back to SQLite (./narratekpi.db inside the
      # container, persists only while the container lives).
      # - DATABASE_URL=postgres://user:pass@host:5432/narratekpi
      #
      # ── App settings — directory-based storage ───────────────────
      - NARRATEKPI_STORE_PATH=/data/reports_store.json
      # ── Optional: LLM API keys (leave unset for dry-run mode) ────
      # - OPENAI_API_KEY=sk-...
      # - GEMINI_API_KEY=...
      # - DEEPSEEK_API_KEY=...
      # ── Optional: Email ──────────────────────────────────────────
      # - RESEND_API_KEY=re_...
      # - DEFAULT_FROM_EMAIL=reports@youragency.com
    restart: unless-stopped
