# ─────────────────────────────────────────────────────────────────────
#  NarrateKPI — Render Blueprint (Free Tier)
#  https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: narratekpi
    env: python
    region: oregon  # Free-tier eligible region
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      # ── Scheduler ────────────────────────────────────────────────
      - key: SCHEDULER_TIMEZONE
        value: "Europe/Kyiv"
      # ── Database ─────────────────────────────────────────────────
      # Set DATABASE_URL to a PostgreSQL connection string for production.
      # If unset, the app falls back to SQLite (not recommended on Render
      # free tier as data is ephemeral).
      - key: DATABASE_URL
        sync: false
      # ── LLM — NVIDIA (highest priority) ─────────────────────────
      # - key: NVIDIA_API_KEY
      #   sync: false
      # - key: NVIDIA_MODEL_NAME
      #   value: "meta/llama-3.3-70b-instruct"
      # ── LLM — OpenAI / DeepSeek / Gemini (fallbacks) ───────────
      # - key: OPENAI_API_KEY
      #   sync: false
      # - key: DEEPSEEK_API_KEY
      #   sync: false
      # - key: GEMINI_API_KEY
      #   sync: false
      # ── Email — Resend (optional — unset = dry-run mock mode) ───
      # - key: RESEND_API_KEY
      #   sync: false
      # - key: FROM_EMAIL
      #   value: "reports@youragency.com"
      # - key: DEFAULT_FROM_EMAIL
      #   value: "reports@youragency.com"
